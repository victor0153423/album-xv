<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Álbum Digital</title>

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#f7eadb;
}

/* HEADER */
.header{
  text-align:center;
  padding:25px 10px 5px;
}

.header h1{
  margin:0;
  font-size:clamp(22px, 5vw, 32px);
  font-weight:700;
}

/* BOTÓN SUBIR */
.upload-area{
  display:flex;
  justify-content:center;
  margin:10px 0;
}

.upload-btn{
  background:linear-gradient(90deg,#d08a7b,#e6a39a);
  color:#fff;
  border:none;
  padding:12px 18px;
  border-radius:25px;
  font-weight:600;
  cursor:pointer;
  box-shadow:0 3px 8px rgba(0,0,0,0.1);
  width:90%;
  max-width:300px;
}

/* PANEL */
.panel{
  background:#fff;
  margin:10px;
  padding:12px;
  border-radius:14px;
  box-shadow:0 3px 12px rgba(0,0,0,0.08);
}

/* HEADER DE GALERÍA */
.view{
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-size:13px;
  flex-wrap:wrap;
  gap:10px;
}

/* BOTONES ICONO */
.view-buttons{
  display:flex;
  gap:8px;
}

.icon-btn{
  background:#fff;
  border:1px solid #caa08f;
  border-radius:50%;
  padding:6px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:0.2s;
}

.icon-btn:hover{
  transform:scale(1.05);
}

/* GALERÍA */
.gallery{
  display:grid;
  grid-template-columns:1fr;
  gap:10px;
  margin-top:15px;
}

/* CARD */
.card{
  position:relative;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 3px 10px rgba(0,0,0,0.08);
  background:#fff;
}

.card img{
  width:100%;
  display:block;
}

.card .info{
  padding:8px;
  font-size:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
}

/* ❌ BOTÓN ELIMINAR */
.delete-btn{
  position:absolute;
  top:8px;
  right:8px;
  background:red;
  color:white;
  border:none;
  width:24px;
  height:24px;
  border-radius:50%;
  font-weight:bold;
  cursor:pointer;
  z-index:10;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* TABLET / ESCRITORIO */
@media (min-width: 700px){

  .panel{
    margin:20px;
    padding:20px;
  }

  .gallery{
    grid-template-columns:repeat(2,1fr);
    gap:12px;
  }

  .view{
    font-size:14px;
  }

  .card .info{
    font-size:13px;
  }

}
</style>

</head>

<body>

<div class="header">
  <h1>Álbum Digital XV</h1>
</div>

<div class="upload-area">

  <input
    type="file"
    id="fileInput"
    hidden
    accept="image/*"
    onchange="uploadFile()"
  >

  <button
    class="upload-btn"
    onclick="document.getElementById('fileInput').click()"
  >
    Subir Foto
  </button>

</div>

<div class="panel">

  <div class="view">

    <div class="view-buttons">

      <button class="icon-btn" onclick="setOneColumn()" title="1 columna">
        <svg width="18" height="18" viewBox="0 0 24 24">
          <rect x="3" y="5" width="18" height="2" fill="#000"/>
          <rect x="3" y="11" width="18" height="2" fill="#000"/>
          <rect x="3" y="17" width="18" height="2" fill="#000"/>
        </svg>
      </button>

      <button class="icon-btn" onclick="setTwoColumns()" title="2 columnas">
        <svg width="18" height="18" viewBox="0 0 24 24">
          <rect x="3" y="3" width="8" height="8" fill="#000"/>
          <rect x="13" y="3" width="8" height="8" fill="#000"/>
          <rect x="3" y="13" width="8" height="8" fill="#000"/>
          <rect x="13" y="13" width="8" height="8" fill="#000"/>
        </svg>
      </button>

    </div>

    <div>Galería de fotos</div>

  </div>

  <div class="gallery" id="gallery"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  query,
  orderBy,
  updateDoc,
  doc,
  getDoc,
  deleteDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCVA5KPZG40aXoWCukSc2ON1GHovv24P30",
  authDomain: "album-xv-ec57b.firebaseapp.com",
  projectId: "album-xv-ec57b",
  storageBucket: "album-xv-ec57b.appspot.com",
  messagingSenderId: "826736955809",
  appId: "1:826736955809:web:4303661d17561dff097be0"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* COLUMNAS */
window.setOneColumn = function(){
  document.getElementById("gallery").style.gridTemplateColumns = "1fr";
}

window.setTwoColumns = function(){
  document.getElementById("gallery").style.gridTemplateColumns = "repeat(2,1fr)";
}

/* ❌ ELIMINAR (FIREBASE + CLOUDINARY INTENTO) */
window.deletePhoto = async function(id, publicId){

  if(!confirm("¿Seguro que quieres eliminar esta foto?")) return;

  try{

    // 1. BORRAR FIRESTORE (FUNCIONA)
    await deleteDoc(doc(db,"fotos",id));

    // 2. BORRAR CLOUDINARY (NECESITA BACKEND REAL)
    await fetch("https://api.cloudinary.com/v1_1/djaojazw9/delete_by_token", {
      method: "POST",
      body: JSON.stringify({
        public_id: publicId
      })
    });

  }catch(error){
    console.log(error);
    alert("Error al eliminar");
  }

}

/* LIKE */
window.likePhoto = async function(id){

  const likedPhotos =
    JSON.parse(localStorage.getItem("likedPhotos")) || [];

  const refDoc = doc(db,"fotos",id);
  const snapshot = await getDoc(refDoc);

  if(!snapshot.exists()) return;

  const data = snapshot.data();
  let likes = data.likes || 0;

  const alreadyLiked = likedPhotos.includes(id);

  if(alreadyLiked){
    likes = Math.max(0, likes - 1);
    const updated = likedPhotos.filter(p => p !== id);
    localStorage.setItem("likedPhotos", JSON.stringify(updated));
  } else {
    likes += 1;
    likedPhotos.push(id);
    localStorage.setItem("likedPhotos", JSON.stringify(likedPhotos));
  }

  await updateDoc(refDoc,{ likes });

}

/* DESCARGAR */
window.downloadFile = async function(url){

  try{
    const response = await fetch(url);
    const blob = await response.blob();
    const blobUrl = window.URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = blobUrl;
    a.download = "foto.jpg";

    document.body.appendChild(a);
    a.click();
    a.remove();

    window.URL.revokeObjectURL(blobUrl);

  }catch(error){
    alert("No se pudo descargar");
  }
}

/* SUBIR SOLO IMÁGENES */
window.uploadFile = async function(){

  const file = document.getElementById("fileInput").files[0];
  if(!file) return;

  try{

    const formData = new FormData();
    formData.append("file", file);
    formData.append("upload_preset", "album_video");

    const response = await fetch(
      "https://api.cloudinary.com/v1_1/djaojazw9/image/upload",
      { method:"POST", body: formData }
    );

    const data = await response.json();

    if(!data.secure_url){
      alert("Error al subir imagen");
      return;
    }

    await addDoc(collection(db,"fotos"),{
      url: data.secure_url,
      public_id: data.public_id,
      likes: 0,
      fecha: Date.now()
    });

    document.getElementById("fileInput").value = "";
    alert("Imagen subida correctamente");

  }catch(error){
    console.log(error);
    alert("Error al subir imagen");
  }

};

/* MOSTRAR */
const q = query(collection(db,"fotos"), orderBy("fecha","desc"));

onSnapshot(q,(snapshot)=>{

  const gallery = document.getElementById("gallery");
  gallery.innerHTML = "";

  snapshot.forEach((docSnap)=>{

    const foto = docSnap.data();
    const id = docSnap.id;

    const liked =
      JSON.parse(localStorage.getItem("likedPhotos")) || [];

    const isLiked = liked.includes(id);

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <button class="delete-btn" onclick="deletePhoto('${id}','${foto.public_id}')">×</button>

      <img src="${foto.url}">

      <div class="info">
        <span>Invitado</span>

        <div style="display:flex;gap:10px;align-items:center;">

          <div onclick="likePhoto('${id}')" style="cursor:pointer;">
            ${isLiked ? "❤️" : "🤍"}
            ${foto.likes || 0}
          </div>

          <div onclick="downloadFile('${foto.url}')" style="cursor:pointer;">
            📥
          </div>

        </div>
      </div>
    `;

    gallery.appendChild(div);

  });

});

</script>

</body>
</html>
