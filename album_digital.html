<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Álbum Digital</title>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#f7eadb;
}

/* HEADER */
.header{
  text-align:center;
  padding:40px 20px 10px;
}

.header h1{
  margin:0;
  font-size:32px;
  font-weight:700;
}

/* BOTÓN SUBIR */
.upload-area{
  display:flex;
  justify-content:center;
  margin:15px 0;
}

.upload-btn{
  background:linear-gradient(90deg,#d08a7b,#e6a39a);
  color:#fff;
  border:none;
  padding:10px 18px;
  border-radius:25px;
  font-weight:600;
  cursor:pointer;
  box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

/* PANEL */
.panel{
  background:#fff;
  margin:20px;
  padding:20px;
  border-radius:15px;
  box-shadow:0 3px 12px rgba(0,0,0,0.08);
}

/* HEADER DE GALERÍA */
.view{
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-size:14px;
}

/* BOTONES ICONO */
.view-buttons{
  display:flex;
  gap:10px;
}

.icon-btn{
  background:#fff;
  border:1px solid #caa08f;
  border-radius:50%;
  padding:8px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:0.2s;
}

.icon-btn:hover{
  transform:scale(1.05);
}

/* GALERÍA */
.gallery{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
  margin-top:15px;
}

.gallery.one{
  grid-template-columns:1fr;
}

/* CARD */
.card{
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 3px 10px rgba(0,0,0,0.08);
  background:#fff;
}

.card img{
  width:100%;
  display:block;
}

.card .info{
  padding:10px;
  font-size:13px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
</style>

</head>

<body>

<!-- HEADER -->
<div class="header">
  <h1>Álbum Digital XV</h1>
</div>

<!-- BOTÓN SUBIR -->
<div class="upload-area">
  <input type="file" id="fileInput" hidden onchange="uploadImage()">
  <button class="upload-btn" onclick="document.getElementById('fileInput').click()">
    Subir Foto
  </button>
</div>

<!-- PANEL -->
<div class="panel">

  <div class="view">

    <div class="view-buttons">

      <!-- ICONOS ORIGINALES -->
      <button class="icon-btn" onclick="setOneColumn()" title="1 columna">
        <svg width="20" height="20" viewBox="0 0 24 24">
          <rect x="3" y="5" width="18" height="2" fill="#000"/>
          <rect x="3" y="11" width="18" height="2" fill="#000"/>
          <rect x="3" y="17" width="18" height="2" fill="#000"/>
        </svg>
      </button>

      <button class="icon-btn" onclick="setTwoColumns()" title="2 columnas">
        <svg width="20" height="20" viewBox="0 0 24 24">
          <rect x="3" y="3" width="8" height="8" fill="#000"/>
          <rect x="13" y="3" width="8" height="8" fill="#000"/>
          <rect x="3" y="13" width="8" height="8" fill="#000"/>
          <rect x="13" y="13" width="8" height="8" fill="#000"/>
        </svg>
      </button>

    </div>

    <div>Galería de fotos</div>

  </div>

  <!-- GALERÍA -->
  <div class="gallery" id="gallery"></div>

</div>

<script>
function setOneColumn(){
  document.getElementById("gallery").classList.add("one");
}

function setTwoColumns(){
  document.getElementById("gallery").classList.remove("one");
}

/* ❤️ LIKE CON CONTADOR */
function like(el){

  let container = el.parentElement;
  let counter = container.querySelector(".like-count");

  let isLiked = el.textContent === "❤️";

  if(isLiked){
    el.textContent = "🤍";
    counter.textContent = parseInt(counter.textContent) - 1;
  } else {
    el.textContent = "❤️";
    counter.textContent = parseInt(counter.textContent) + 1;
  }
}

/* 🚀 SUBIDA */
async function uploadImage(){

  const file = document.getElementById("fileInput").files[0];
  if(!file) return;

  const formData = new FormData();
  formData.append("file", file);
  formData.append("upload_preset", "album_xv");

  const res = await fetch(
    "https://api.cloudinary.com/v1_1/djaojazw9/image/upload",
    {
      method: "POST",
      body: formData
    }
  );

  const data = await res.json();
  const url = data.secure_url;

  const gallery = document.getElementById("gallery");

  const div = document.createElement("div");
  div.className = "card";

  div.innerHTML = `
    <img src="${url}">

    <div class="info">

      <span>Invitado</span>

      <div style="display:flex;gap:10px;align-items:center;">

        <!-- LIKE + CONTADOR -->
        <div style="display:flex;align-items:center;gap:5px;cursor:pointer;">
          <span onclick="like(this)" style="font-size:18px;">🤍</span>
          <span class="like-count">0</span>
        </div>

        <!-- DESCARGA -->
        <a href="${url}" download target="_blank" style="font-size:16px;text-decoration:none;">
          📥
        </a>

      </div>

    </div>
  `;

  gallery.appendChild(div);
}
</script>

</body>
</html>
